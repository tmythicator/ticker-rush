name: Frontend Tests

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "container/**"
      - "scripts/**"
      - "Taskfile.yml"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/frontend-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "container/**"
      - "scripts/**"
      - "Taskfile.yml"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/frontend-test.yml"

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Magic Nix Cache
        uses: determinate-systems/magic-nix-cache-action@v14

      - name: Cache pnpm store & node_modules
        uses: actions/cache@v6
        with:
          path: |
            ~/.local/share/pnpm/store
            frontend/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Dependencies
        run: nix develop --command task frontend:deps

      - name: Build
        run: nix develop --command task frontend:build

      - name: Run CI (Lint, Format Check, Test)
        run: nix develop --command task frontend:ci

      - name: Run Nginx Config Integration Tests
        run: nix develop --command task infra:test-nginx
