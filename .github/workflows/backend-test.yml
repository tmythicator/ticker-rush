name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "go.mod"
      - "go.sum"
      - "Taskfile.yml"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/backend-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "go.mod"
      - "go.sum"
      - "Taskfile.yml"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/backend-test.yml"

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Cache Go modules & Build Cache
        uses: actions/cache@v6
        with:
          path: |
            .data/go
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Dependencies
        run: nix develop --command task backend:deps

      - name: Build
        run: nix develop --command task backend:build

      - name: Run CI (Lint, Test, Check formatting/diffs)
        run: nix develop --command task backend:ci
