syntax = "proto3";

package user.v1;

import "google/protobuf/timestamp.proto";
import "portfolio/v1/portfolio.proto";

option go_package = "github.com/tmythicator/ticker-rush/backend/internal/proto/user/v1;user";

message User {
  int64 id = 1;
  string username = 2;
  string first_name = 3;
  string last_name = 4;
  string website = 5;
  bool is_public = 6;
  bool is_admin = 7;
  bool is_banned = 8;
  google.protobuf.Timestamp created_at = 9;
  double balance = 10;
  map<string, portfolio.v1.PortfolioItem> portfolio = 11;
  bool is_participating = 12;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
  string website = 5;
  bool agb_accepted = 6;
}

message CreateUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  string first_name = 1;
  string last_name = 2;
  string website = 3;
  bool is_public = 4;
}

message UpdateUserResponse {
  User user = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  User user = 1;
}

message GetUserResponse {
  User user = 1;
}

message GetPublicProfileRequest {
  string username = 1;
}

message GetPublicProfileResponse {
  User user = 1;
}
