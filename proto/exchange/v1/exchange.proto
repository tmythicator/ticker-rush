syntax = "proto3";

package exchange.v1;

import "google/api/annotations.proto";
import "ladder/v1/ladder.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/tmythicator/ticker-rush/backend/internal/proto/exchange/v1;exchange";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Exchange Service API"
    version: "1.0.0"
    description: "API for stock quotes, market history, and trading."
  }
  security_definitions: {
    security: {
      key: "CookieAuth"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "auth_token"
        description: "Authentication cookie 'auth_token' containing JWT"
      }
    }
  }
};

// Real-time stock price data.
message Quote {
  // Stock ticker symbol.
  string symbol = 1;
  // Current price in USD.
  double price = 2;
  // Absolute price change compared to the previous close.
  double change = 3;
  // Percentage price change compared to the previous close.
  double change_percent = 4;
  // Unix timestamp of the price update in seconds.
  int64 timestamp = 5;
  // Price data provider source.
  string source = 6;
  // Indicates if the market is closed for this stock.
  bool is_closed = 7;
}

// ExchangeService manages stock quotes, market history, transactions, and live streams.
service ExchangeService {
  // Retrieves the current quote and metadata for a single stock.
  rpc GetQuote(GetQuoteRequest) returns (GetQuoteResponse) {
    option (google.api.http) = {get: "/api/quote"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "CookieAuth"
          value: {}
        }
      }
    };
  }

  // Returns historical quote candles for a stock.
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse) {
    option (google.api.http) = {get: "/api/history"};
  }

  // Opens a Server-Sent Events (SSE) stream for real-time stock quote updates.
  rpc StreamQuotes(StreamQuotesRequest) returns (stream StreamQuotesResponse) {
    option (google.api.http) = {get: "/api/quotes/events"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "CookieAuth"
          value: {}
        }
      }
    };
  }

  // Purchases stock shares for the authenticated user.
  rpc BuyStock(BuyStockRequest) returns (BuyStockResponse) {
    option (google.api.http) = {
      post: "/api/buy"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "CookieAuth"
          value: {}
        }
      }
    };
  }

  // Sells stock shares owned by the authenticated user.
  rpc SellStock(SellStockRequest) returns (SellStockResponse) {
    option (google.api.http) = {
      post: "/api/sell"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "CookieAuth"
          value: {}
        }
      }
    };
  }
}

// Request to fetch a stock quote.
message GetQuoteRequest {
  // Stock ticker symbol.
  string symbol = 1;
}

// Response containing the stock quote.
message GetQuoteResponse {
  // Current stock quote.
  Quote quote = 1;
}

// Request to retrieve price history.
message GetHistoryRequest {
  // Stock ticker symbol.
  string symbol = 1;
  // Maximum number of historical records to return.
  int32 limit = 2;
}

// Response containing historical quote records.
message GetHistoryResponse {
  // Historical stock quote entries.
  repeated Quote history = 1;
}

// Request to establish a real-time quote stream.
message StreamQuotesRequest {
  // Optional ticker symbol to filter updates. If empty, streams all tickers.
  string symbol = 1;
}

// Response payload for real-time quote stream.
message StreamQuotesResponse {
  // Live stock quote update.
  Quote quote = 1;
}

// Request payload to purchase stock.
message BuyStockRequest {
  // Stock ticker symbol to buy.
  string symbol = 1;
  // Quantity of shares to buy.
  double quantity = 2;
}

// Response payload for a stock purchase.
message BuyStockResponse {
  // Whether the transaction succeeded.
  bool success = 1;
  // Status or error message.
  string message = 2;
  // Updated standing and portfolio of the participant.
  ladder.v1.LadderParticipant participant = 3;
}

// Request payload to sell stock.
message SellStockRequest {
  // Stock ticker symbol to sell.
  string symbol = 1;
  // Quantity of shares to sell.
  double quantity = 2;
}

// Response payload for a stock sale.
message SellStockResponse {
  // Whether the transaction succeeded.
  bool success = 1;
  // Status or error message.
  string message = 2;
  // Updated standing and portfolio of the participant.
  ladder.v1.LadderParticipant participant = 3;
}
