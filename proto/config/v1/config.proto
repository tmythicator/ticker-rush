syntax = "proto3";

package config.v1;

import "ladder/v1/ladder.proto";

option go_package = "github.com/tmythicator/ticker-rush/backend/internal/proto/config/v1;config";

service ConfigService {
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
}

message GetConfigRequest {}

message GetConfigResponse {
  repeated ladder.v1.TickerInfo tickers = 1;
}
