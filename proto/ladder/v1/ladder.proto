syntax = "proto3";

package ladder.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "user/v1/user.proto";

option go_package = "github.com/tmythicator/ticker-rush/backend/internal/proto/ladder/v1;ladder";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Ladder Service API"
    version: "1.0.0"
    description: "API for viewing and participating in competition ladders."
  }
  security_definitions: {
    security: {
      key: "CookieAuth"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "auth_token"
        description: "Authentication cookie 'auth_token' containing JWT"
      }
    }
  }
};

// Competition cycle or season.
message Ladder {
  // Unique database identifier.
  int64 id = 1;
  // Name of the competition.
  string name = 2;
  // Type of competition cycle (weekly or monthly).
  string type = 3;
  // Start time of the competition.
  google.protobuf.Timestamp start_time = 4;
  // End time of the competition.
  google.protobuf.Timestamp end_time = 5;
  // Whether the ladder is currently active.
  bool is_active = 6;
  // Creation timestamp of the ladder.
  google.protobuf.Timestamp created_at = 7;
  // Starting cash balance allocated to participants.
  double initial_balance = 8;
  // List of stock tickers allowed in this competition.
  repeated TickerInfo allowed_tickers = 9;
}

// Configuration of an allowed stock in the ladder.
message TickerInfo {
  // Stock ticker symbol.
  string symbol = 1;
  // Source provider for market data.
  string source = 2;
}

// User standing and status in a ladder.
message LadderParticipant {
  // Identifier of the ladder.
  int64 ladder_id = 1;
  // User profile of the participant.
  user.v1.User user = 2;
  // Final rank in the ladder (set after completion).
  int32 final_rank = 3;
  // Timestamp when the user joined.
  google.protobuf.Timestamp joined_at = 4;
}

// Request to retrieve active ladder.
message GetActiveLadderRequest {}

// Response containing active ladder metadata.
message GetActiveLadderResponse {
  // Active competition ladder.
  Ladder ladder = 1;
}

// Request to join a ladder.
message JoinLadderRequest {}

// Response for joining a ladder.
message JoinLadderResponse {
  // Whether the transaction succeeded.
  bool success = 1;
  // Detailed status or error message.
  string message = 2;
}

// LadderService manages active competition cycles and handles user enrollment.
service LadderService {
  // GetActiveLadder retrieves full metadata for the currently active ladder.
  rpc GetActiveLadder(GetActiveLadderRequest) returns (GetActiveLadderResponse) {
    option (google.api.http) = {get: "/api/v1/ladder/active"};
  }

  // JoinLadder enrolls the authenticated user into the active ladder competition.
  rpc JoinLadder(JoinLadderRequest) returns (JoinLadderResponse) {
    option (google.api.http) = {post: "/api/v1/ladder/join"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "CookieAuth"
          value: {}
        }
      }
    };
  }
}
